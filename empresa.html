<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Administrar Empresa</title>

<link rel="stylesheet" href="empresa.css">

</head>

<body>

<div class="container">

    <div class="card">

        <h1 id="nombreEmpresa">
            Cargando...
        </h1>

        <div class="empresa-info">

            <p>
                <strong>RUC:</strong>
                <span id="ruc"></span>
            </p>

            <p>
                <strong>Correo:</strong>
                <span id="correoEmpresa"></span>
            </p>

            <p>
                <strong>Teléfono:</strong>
                <span id="telefonoEmpresa"></span>
            </p>

        </div>

    </div>

    <div class="card">

        <h2>Usuarios de Acceso</h2>

        <div class="form-grid">

            <input
            type="text"
            id="nombreUsuario"
            placeholder="Nombre Completo">

            <input
            type="email"
            id="correoUsuario"
            placeholder="Correo">

            <input
            type="password"
            id="passwordUsuario"
            placeholder="Contraseña">

            <select id="rolUsuario">

                <option value="ADMIN">
                    ADMIN
                </option>

                <option value="RRHH">
                    RRHH
                </option>

                <option value="SUPERVISOR">
                    SUPERVISOR
                </option>

                <option value="CONSULTA">
                    CONSULTA
                </option>

            </select>

        </div>

        <button
        id="btnCrearUsuario"
        class="btn-guardar">

            Crear Usuario

        </button>

    </div>

    <div class="card">

        <h2>Usuarios Registrados</h2>

        <table>

            <thead>

                <tr>

                    <th>Nombre</th>
                    <th>Correo</th>
                    <th>Rol</th>
                    <th>Estado</th>
                    <th>Acciones</th>

                </tr>

            </thead>

            <tbody id="tablaUsuarios">
            </tbody>

        </table>

    </div>

</div>

<!-- MODAL EDITAR USUARIO -->

<div id="modalUsuario" class="modal">

    <div class="modal-content">

        <div class="modal-header">

            <h2>Editar Usuario</h2>

            <span
            class="cerrar"
            onclick="cerrarModal()">
                ×
            </span>

        </div>

        <input
        type="hidden"
        id="editId">

        <label>Nombre</label>

        <input
        type="text"
        id="editNombre">

        <label>Correo</label>

        <input
        type="email"
        id="editCorreo">

        <label>Rol</label>

        <select id="editRol">

            <option value="ADMIN">
                ADMIN
            </option>

            <option value="RRHH">
                RRHH
            </option>

            <option value="SUPERVISOR">
                SUPERVISOR
            </option>

            <option value="CONSULTA">
                CONSULTA
            </option>

        </select>

        <label>Estado</label>

        <select id="editEstado">

            <option value="true">
                Activo
            </option>

            <option value="false">
                Inactivo
            </option>

        </select>

        <div class="modal-footer">

            <button
            class="btn-desactivar"
            onclick="cerrarModal()">

                Cancelar

            </button>

            <button
            class="btn-guardar"
            onclick="guardarEdicion()">

                Guardar

            </button>

        </div>

    </div>

</div>

<script type="module" src="empresa.js"></script>

</body>
</html>
