<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Administrar Empresa</title>

<link rel="stylesheet" href="empresa.css">

</head>

<body>

<div class="container">

    <div class="card">

        <h1 id="nombreEmpresa">
            Cargando...
        </h1>

        <div class="empresa-info">

            <p>
                <strong>RUC:</strong>
                <span id="ruc"></span>
            </p>

            <p>
                <strong>Correo:</strong>
                <span id="correoEmpresa"></span>
            </p>

            <p>
                <strong>Teléfono:</strong>
                <span id="telefonoEmpresa"></span>
            </p>

        </div>

    </div>

    <div class="card">

        <h2>Usuarios de Acceso</h2>

        <div class="form-grid">

            <input
            type="text"
            id="nombreUsuario"
            placeholder="Nombre Completo">

            <input
            type="email"
            id="correoUsuario"
            placeholder="Correo">

            <input
            type="password"
            id="passwordUsuario"
            placeholder="Contraseña">

            <select id="rolUsuario">

                <option value="ADMIN">
                    ADMIN
                </option>

                <option value="RRHH">
                    RRHH
                </option>

                <option value="SUPERVISOR">
                    SUPERVISOR
                </option>

                <option value="CONSULTA">
                    CONSULTA
                </option>

            </select>

        </div>

        <button
        id="btnCrearUsuario"
        class="btn-guardar">

            Crear Usuario

        </button>

    </div>

    <div class="card">

        <h2>Usuarios Registrados</h2>

        <table>

            <thead>

                <tr>

                    <th>Nombre</th>
                    <th>Correo</th>
                    <th>Rol</th>
                    <th>Estado</th>
                    <th>Acciones</th>

                </tr>

            </thead>

            <tbody id="tablaUsuarios">
            </tbody>

        </table>

    </div>

</div>

<script type="module" src="empresa.js"></script>

</body>
</html>
