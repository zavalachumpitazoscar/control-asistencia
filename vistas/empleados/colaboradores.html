<section class="colaboradores">

    <!--======================================
        ENCABEZADO
    =======================================-->

    <div class="encabezado-seccion">

        <div>

            <h2>
                Colaboradores
            </h2>

            <p>
                Administra los colaboradores de la empresa.
            </p>

        </div>

        <button
        id="btnNuevoColaborador"
        class="btn-principal">

            <i class="bi bi-plus-circle"></i>

            Nuevo colaborador

        </button>

    </div>



<!--======================================
    BARRA DE HERRAMIENTAS
=======================================-->

<div class="barra-herramientas">

<div class="acciones-masivas">

    <button
    id="btnCargaMasiva">

        <i class="bi bi-upload"></i>

        Carga masiva

    </button>

    <button
    id="btnActivarSeleccion"
    disabled>

        <i class="bi bi-check-circle"></i>

        Activar

    </button>

    <button
    id="btnDesactivarSeleccion"
    disabled>

        <i class="bi bi-lock"></i>

        Desactivar

    </button>

    <button
    id="btnEliminarSeleccion"
    disabled>

        <i class="bi bi-trash"></i>

        Eliminar

    </button>

</div>


    <div class="busqueda">

        <i class="bi bi-search"></i>

        <input
        id="buscarColaborador"
        type="text"
        placeholder="Buscar por nombre o DNI">

    </div>

</div>

<!--======================================
    PAGINACIÓN
=======================================-->

<div class="paginacion">

    <div class="paginacion-info">

        Mostrando

        <span id="inicioPagina">

            0

        </span>

        -

        <span id="finPagina">

            0

        </span>

        de

        <span id="totalRegistros">

            0

        </span>

        colaboradores

    </div>


    <div class="paginacion-controles">

        <label>

            Mostrar

            <select id="registrosPagina">

                <option value="10">

                    10

                </option>

                <option value="20" selected>

                    20

                </option>

                <option value="50">

                    50

                </option>

                <option value="100">

                    100

                </option>

            </select>

        </label>


        <button id="paginaAnterior">

            <i class="bi bi-chevron-left"></i>

        </button>

        <span id="numeroPagina">

            1

        </span>

        <button id="paginaSiguiente">

            <i class="bi bi-chevron-right"></i>

        </button>

    </div>

</div>

<!--======================================
    LISTADO
=======================================-->

<div class="tabla-wrapper">

    <div class="tabla-colaboradores">

        <!-- CABECERA -->

        <div class="tabla-header">

            <div>

                <input
                id="seleccionarTodos"
                type="checkbox">

            </div>

            <div>DNI</div>

            <div>Apellidos</div>

            <div>Nombres</div>

            <div>Sucursal</div>

            <div>Área</div>

            <div>Subárea</div>

            <div>Horario</div>

            <div>Estado</div>

            <div class="columna-acciones">

                Acciones

            </div>

        </div>



        <!-- FILAS -->

        <div
        id="listaColaboradores"
        class="tabla-body">

        </div>

    </div>

</div>


<!--======================================
    MODAL
=======================================-->

<div
id="modalColaborador"
class="modal">

    <div class="modal-contenido modal-colaborador">

        <div class="modal-header">

            <h3>

                Nuevo colaborador

            </h3>

            <button id="cerrarColaborador">

                ×

            </button>

        </div>


        <div class="modal-body">

            <!--
                Aquí construiremos posteriormente
                el asistente (Wizard)
                para registrar colaboradores.
            -->

        </div>


        <div class="modal-footer">

            <button
            id="guardarColaborador"
            class="btn-principal">

                Guardar

            </button>

        </div>

    </div>

</div>
