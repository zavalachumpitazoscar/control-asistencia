<section class="sucursales">

    <div class="encabezado-seccion">

        <div>

            <h2>Sucursales</h2>

            <p>
                Administra las sedes de la empresa.
            </p>

        </div>

        <button
            id="btnNuevaSucursal"
            class="btn-principal">

            <i class="bi bi-plus-circle"></i>
            Nueva sucursal

        </button>

    </div>


    <div
        id="listaSucursales"
        class="lista-sucursales">

        <!-- JS -->

    </div>

</section>



<!-- MODAL -->

<div
id="modalSucursal"
class="modal">

    <div class="modal-contenido">

        <div class="modal-header">

            <h3>

                Nueva sucursal

            </h3>

            <button id="cerrarSucursal">

                ✕

            </button>

        </div>


        <div class="modal-body">

            <div class="campo">

                <label>

                    Nombre

                </label>

                <input
                id="nombreSucursal"
                type="text"
                placeholder="Sucursal Lima Centro">

            </div>


            <div class="campo">

                <label>

                    Dirección

                </label>

                <input
                id="direccionSucursal"
                type="text"
                placeholder="Av. Javier Prado 123">

            </div>


            <div class="campo">

                <label>

                    Departamento

                </label>

                <input
                id="departamentoSucursal"
                type="text">

            </div>


            <div class="campo">

                <label>

                    Provincia

                </label>

                <input
                id="provinciaSucursal"
                type="text">

            </div>


            <div class="campo">

                <label>

                    Distrito

                </label>

                <input
                id="distritoSucursal"
                type="text">

            </div>

        </div>


        <div class="modal-footer">

            <button
            id="guardarSucursal"
            class="btn-principal">

                Guardar

            </button>

        </div>

    </div>

</div>
