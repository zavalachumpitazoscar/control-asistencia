

    <div class="card-header">

    =========================== -->

    <h3 class="titulo-seccion">

        <div class="campo">

            <label>RUC</label>

            <input
                type="text"
                id="ruc">

        </div>

        <div class="campo">

            <label>Razón Social</label>

            <input
                type="text"
                id="razonSocial">

        </div>

            <label>Giro del Negocio</label>

            <input
                type="text"
                id="giro">

        </div>

    </div>



    <!-- ==========================
         UBICACIÓN
    =========================== -->

    <h3 class="titulo-seccion">
        📍 Ubicación
    </h3>

    <div class="grid-formulario">

        <div class="campo campo-completo">

            <label>Dirección</label>

            <input
                type="text"
                id="direccion">

        </div>

        <div class="campo">

            <label>Departamento</label>

            <input
                type="text"
                id="departamento">

        </div>

            <label>Provincia</label>

            <input
                type="text"
                id="provincia">

        </div>

            <label>Distrito</label>

            <input
                type="text"
                id="distrito">

        </div>

        <div class="campo">

            <label>País</label>

            <input
                type="text"
                id="pais">

        </div>

        <div class="campo">

            <input
                type="text"

        </div>

    </div>

    <div class="header-lista">

<div class="header-lista">

    <div>

        <h4>Representantes</h4>

        <p>
            Personas autorizadas de la empresa.
        </p>

    </div>

    <button

<div id="modalAcceso" class="modal">

<div class="modal-contenido">

<h2>Nuevo acceso</h2>


<input 
id="nombreAcceso"
placeholder="Nombre">


<input
id="correoAcceso"
type="email"
placeholder="Correo de acceso">


<select id="rolAcceso">

<option value="ADMIN">
Administrador
</option>


<option value="REVISOR">
Revisor
</option>


<option value="SUPERVISOR">
Supervisor
</option>


</select>


<button id="guardarAcceso">
Crear acceso
</button>


<button id="cerrarAcceso">
Cancelar
</button>


</div>

</div>


<div id="modalRepresentante" class="modal">


<div class="modal-contenido">


<h2>Nuevo Representante</h2>


<input
id="nombreRepresentante"
placeholder="Nombre completo">


<input
id="dniRepresentante"
placeholder="DNI">


<input
id="correoRepresentante"
placeholder="Correo">


<input
id="telefonoRepresentante"
placeholder="Teléfono">


<input
id="cargoRepresentante"
placeholder="Cargo">


<button id="guardarRepresentante">
Guardar representante
</button>


<button id="cerrarRepresentante">
Cancelar
</button>


</div>
