<div class="card-compania">

    <div class="card-header">

        <div>

            <h3>Información General</h3>

            <p>
                Administra la información de tu empresa.
            </p>

        </div>

        <button
            id="btnGuardarEmpresa"
            class="btn-guardar">

            💾 Guardar cambios

        </button>

    </div>



    <!-- ==========================
         EMPRESA
    =========================== -->

    <h3 class="titulo-seccion">
        🏢 Datos de la Empresa
    </h3>

    <div class="grid-formulario">

        <div class="campo">

            <label>RUC</label>

            <input
                type="text"
                id="ruc">

        </div>

        <div class="campo">

            <label>Razón Social</label>

            <input
                type="text"
                id="razonSocial">

        </div>

        <div class="campo campo-completo">

            <label>Giro del Negocio</label>

            <input
                type="text"
                id="giro">

        </div>

    </div>



    <!-- ==========================
         UBICACIÓN
    =========================== -->

    <h3 class="titulo-seccion">
        📍 Ubicación
    </h3>

    <div class="grid-formulario">

        <div class="campo campo-completo">

            <label>Dirección</label>

            <input
                type="text"
                id="direccion">

        </div>

        <div class="campo">

            <label>Departamento</label>

            <input
                type="text"
                id="departamento">

        </div>

        <div class="campo">

            <label>Provincia</label>

            <input
                type="text"
                id="provincia">

        </div>

        <div class="campo">

            <label>Distrito</label>

            <input
                type="text"
                id="distrito">

        </div>

        <div class="campo">

            <label>País</label>

            <input
                type="text"
                id="pais">

        </div>

        <div class="campo">

            <label>Código Postal</label>

            <input
                type="text"
                id="codigoPostal">

        </div>

    </div>



    <!-- ==========================
         CUENTA
    =========================== -->

    <h3 class="titulo-seccion">
    🔐 Accesos al Sistema
    </h3>

    <div class="header-lista">

    <div>

        <h4>Usuarios con acceso</h4>

        <p>
            Administra quién puede ingresar al sistema.
        </p>

    </div>

    <button
        id="btnNuevoAcceso"
        class="btn-secundario">

        + Nuevo Acceso

    </button>

</div>

<div id="listaAccesos">

</div>


    <!-- ==========================
         REPRESENTANTES
    =========================== -->

<div class="header-lista">

    <div>

        <h4>Representantes</h4>

        <p>
            Personas autorizadas de la empresa.
        </p>

    </div>

    <button
        id="btnNuevoRepresentante"
        class="btn-secundario">

        + Agregar

    </button>

</div>

<div id="listaRepresentantes">

</div>

</div>


<div id="modalAcceso" class="modal">

    <div class="modal-contenido">

        <h2>Nuevo acceso</h2>

        <input 
        id="nombreAcceso"
        placeholder="Nombre completo">


        <input 
        id="correoAcceso"
        type="email"
        placeholder="Correo">


        <select id="rolAcceso">

            <option value="REPRESENTANTE">
                Representante
            </option>

            <option value="ADMIN">
                Administrador
            </option>

        </select>


        <button id="guardarAcceso">
            Crear acceso
        </button>


        <button id="cerrarAcceso">
            Cancelar
        </button>


    </div>

</div>
