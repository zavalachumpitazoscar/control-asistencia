<div class="card-compania">

    <div class="card-header">

        <div>

            <h3>Información General</h3>

            <p>
                Datos principales de la empresa.
            </p>

        </div>

        <button id="btnGuardarEmpresa" class="btn-guardar">

            💾 Guardar cambios

        </button>

    </div>



    <div class="grid-formulario">

        <div class="campo">

            <label>Nombre Comercial</label>

            <input
            type="text"
            id="nombreComercial">

        </div>



        <div class="campo">

            <label>Razón Social</label>

            <input
            type="text"
            id="razonSocial">

        </div>



        <div class="campo">

            <label>RUC</label>

            <input
            type="text"
            id="ruc">

        </div>



        <div class="campo">

            <label>Correo</label>

            <input
            type="email"
            id="correo">

        </div>



        <div class="campo">

            <label>Teléfono</label>

            <input
            type="text"
            id="telefono">

        </div>



        <div class="campo campo-completo">

            <label>Dirección</label>

            <input
            type="text"
            id="direccion">

        </div>



        <div class="campo">

            <label>Representante</label>

            <input
            type="text"
            id="representante">

        </div>



        <div class="campo">

            <label>Estado</label>

            <select id="estado">

                <option value="ACTIVO">

                    ACTIVO

                </option>

                <option value="INACTIVO">

                    INACTIVO

                </option>

            </select>

        </div>

    </div>

</div>
