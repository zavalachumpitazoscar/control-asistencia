<div class="card-compania">

    <div class="card-header">

        <div>

            <h3>Información General</h3>

            <p>
                Administra la información principal de tu empresa.
            </p>

        </div>

        <button
        id="btnGuardarEmpresa"
        class="btn-guardar">

            💾 Guardar cambios

        </button>

    </div>


    <div class="grid-formulario">

        <!-- EMPRESA -->

        <div class="campo">

            <label>RUC</label>

            <input
            type="text"
            id="ruc">

        </div>

        <div class="campo">

            <label>Razón Social</label>

            <input
            type="text"
            id="razonSocial">

        </div>

        <div class="campo campo-completo">

            <label>Giro del Negocio</label>

            <input
            type="text"
            id="giro">

        </div>


        <!-- UBICACIÓN -->

        <div class="campo campo-completo">

            <label>Dirección</label>

            <input
            type="text"
            id="direccion">

        </div>

        <div class="campo">

            <label>Departamento</label>

            <input
            type="text"
            id="departamento">

        </div>

        <div class="campo">

            <label>Provincia</label>

            <input
            type="text"
            id="provincia">

        </div>

        <div class="campo">

            <label>Distrito</label>

            <input
            type="text"
            id="distrito">

        </div>

        <div class="campo">

            <label>País</label>

            <input
            type="text"
            id="pais">

        </div>

        <div class="campo">

            <label>Código Postal</label>

            <input
            type="text"
            id="codigoPostal">

        </div>


        <!-- CUENTA -->

        <div class="campo">

            <label>Correo de acceso</label>

            <input
            type="email"
            id="correoLogin"
            readonly>

        </div>

        <div class="campo">

            <label>Estado</label>

            <input
            type="text"
            id="estado"
            readonly>

        </div>

        <div class="campo">

            <label>Fecha de Registro</label>

            <input
            type="text"
            id="fechaRegistro"
            readonly>

        </div>

    </div>

    <hr>

    <h3>

        Representantes

    </h3>

    <div id="listaRepresentantes">

    </div>

</div>
