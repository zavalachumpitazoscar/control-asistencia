<section class="subareas">

    <!--==================================
        ENCABEZADO
    ==================================-->

    <div class="encabezado-seccion">

        <div>

            <h2>Subáreas</h2>

            <p>
                Organiza las subáreas de cada área de la empresa.
            </p>

        </div>

        <button
        id="btnNuevaSubarea"
        class="btn-principal">

            <i class="bi bi-plus-circle"></i>

            Nueva subárea

        </button>

    </div>


    <!--==================================
        LISTADO
    ==================================-->

    <div
    id="listaSubareas"
    class="lista-subareas">

    </div>

</section>



<!--==================================
        MODAL
===================================-->

<div
id="modalSubarea"
class="modal">

    <div class="modal-contenido">

        <div class="modal-header">

            <h3>Nueva subárea</h3>

            <button id="cerrarSubarea">

                <i class="bi bi-x-lg"></i>

            </button>

        </div>


        <div class="modal-body">


            <div class="campo">

                <label>Área</label>

                <select id="areaSubarea">

                    <option value="">
                        Seleccione un área
                    </option>

                </select>

            </div>


            <div class="campo">

                <label>Nombre</label>

                <input
                id="nombreSubarea"
                type="text"
                placeholder="Nombre de la subárea">

            </div>


            <div class="campo">

                <label>Descripción</label>

                <textarea
                id="descripcionSubarea"
                placeholder="Descripción"></textarea>

            </div>

        </div>


        <div class="modal-footer">

            <button
            id="guardarSubarea"
            class="btn-principal">

                Guardar

            </button>

        </div>

    </div>

</div>
