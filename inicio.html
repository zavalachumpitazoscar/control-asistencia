<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Panel Principal</title>

<link rel="stylesheet" href="css/inicio.css">

</head>


<body>


<div class="app">


    <!-- MENU LATERAL -->

    <aside class="sidebar">


        <div class="logo">

            🍰

            <h2>
                PostresAO
            </h2>

        </div>



        <nav>


            <button 
            class="opcion activo"
            data-vista="dashboard">

                🏠
                Inicio

            </button>



            <button 
            class="opcion"
            data-vista="productos">

                🍰
                Productos

            </button>



            <button 
            class="opcion"
            data-vista="pedidos">

                🛒
                Pedidos

            </button>



            <button 
            class="opcion"
            data-vista="usuarios">

                👥
                Usuarios

            </button>



            <button 
            class="opcion"
            data-vista="configuracion">

                ⚙️
                Configuración

            </button>


        </nav>



        <button class="cerrar">

            🚪 Cerrar sesión

        </button>


    </aside>





    <!-- CONTENIDO -->

    <main class="contenido">


        <div id="vista">

            <h1>
                Bienvenido
            </h1>

            <p>
                Selecciona una opción del menú
            </p>


        </div>


    </main>



</div>




<script src="js/inicio.js"></script>


</body>

</html>
