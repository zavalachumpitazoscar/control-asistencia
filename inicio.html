<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link
rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/@sweetalert2/theme-borderless/borderless.min.css">

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<title>Control de Asistencia</title>
    
<link rel="stylesheet" href="css/inicio.css">
<link rel="stylesheet" href="css/compañia.css">

<link rel="stylesheet" href="css/compañia/informacion.css">

<link rel="stylesheet" href="css/compañia/sucursales.css">

<link rel="stylesheet" href="css/compañia/areas.css">

<link rel="stylesheet" href="css/compañia/subareas.css">


</head>


<body>

<div class="overlay"></div>
   

<div class="app">


    <!-- SIDEBAR -->

    <aside class="sidebar">

        <div class="marca">

            <div class="logo">
                ⏱️
            </div>
            <div>
                <h2>
                    Control
                </h2>
                <span>
                    Asistencia
                </span>
            </div>
        </div>

        <nav class="menu">
            
            <button class="item activo" data-vista="dashboard">
                <span>
                    📊
                </span>
                Dashboard
            </button>
            
            <button class="item" data-vista="compañia">
                <span>
                    🏢
                </span> 
                Compañía 
            </button>

            <button class="item" data-vista="asistencia">
                <span>
                    🕒
                </span>
                Asistencia
            </button>

            <button class="item" data-vista="empleados">
                <span>
                    👥
                </span>
                Empleados
            </button>

            <button class="item" data-vista="horarios">
                <span>
                    📅
                </span>
                Horarios
            </button>

            <button class="item" data-vista="reportes">
                <span>
                    📈
                </span>
                Reportes
            </button>

            <button class="item" data-vista="configuracion">
                <span>
                    ⚙️
                </span>
                Configuración
            </button>
            
        </nav>

        <button class="salir">
            🚪Cerrar sesión
        </button>
    </aside>






    <!-- CONTENIDO -->

<section class="contenido">

    <header class="topbar">

        <div class="topbar-izquierda">

            <button class="btn-menu">
                ☰
            </button>

            <h1>Dashboard</h1>

        </div>

<div class="usuario" id="btnUsuario">

    <div class="usuario-avatar">
        👤
    </div>

    <div class="usuario-info">

        <span id="nombreUsuarioTop">
            Usuario
        </span>

        <small>
            Mi cuenta
        </small>

    </div>

    <span class="usuario-flecha">
        ▼
    </span>

</div>

<div
id="menuUsuario"
class="menu-usuario">

    <div class="menu-header">

        <div class="avatar-grande">
            👤
        </div>

        <h3 id="nombreUsuarioMenu">
            Usuario
        </h3>

        <p id="correoUsuarioMenu">
            correo@empresa.com
        </p>

        <span class="badge-rol">
            Administrador
        </span>

    </div>

    <div class="linea"></div>

    <div class="campo-menu">

        <label>Nombre</label>

        <input
        id="perfilNombre"
        type="text">

    </div>

    <div class="campo-menu">

        <label>Correo</label>

        <input
        id="perfilCorreo"
        type="email">

    </div>

    <div class="campo-menu">

    <label>Contraseña actual</label>

    <input
        id="perfilPasswordActual"
        type="password"
        placeholder="••••••••">

    </div>

    <div class="campo-menu">

    <label>Nueva contraseña</label>

    <input
        id="perfilPassword"
        type="password"
        placeholder="••••••••">

    <div class="password-reglas">

        <div id="reglaLongitud" class="regla">
            Mínimo 8 caracteres
        </div>

        <div id="reglaMayuscula" class="regla">
            Una letra mayúscula
        </div>

        <div id="reglaMinuscula" class="regla">
            Una letra minúscula
        </div>

        <div id="reglaEspecial" class="regla">
            Un carácter especial (. ! @ # $ %)
        </div>

    </div>

</div>

    <button
    id="guardarPerfil"
    class="btn-guardar-perfil">

        Guardar cambios

    </button>

</div>

 

    </header>

    
        <main id="contenedorVista">


            <!-- Aquí carga dashboard -->

        </main>



    </section>



</div>

<script type="module" src="js/inicio.js"></script>

</body>

</html>
