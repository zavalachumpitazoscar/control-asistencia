<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Registro</title>

    <link rel="stylesheet"
          href="css/registro.css">

</head>

<body>

    <div class="contenedor">

        <h1>🍰 Crear Cuenta</h1>

        <input
            type="text"
            id="nombre"
            placeholder="Nombres y Apellidos">

        <input
            type="email"
            id="correo"
            placeholder="Correo electrónico">

        <input
            type="password"
            id="password"
            placeholder="Contraseña">

        <button id="btnRegistrar">

            Registrarse

        </button>

        <p>

            ¿Ya tienes cuenta?

            <a href="index.html">

                Iniciar Sesión

            </a>

        </p>

    </div>

    <div id="toast" class="toast"></div>

    <script type="module" src="js/registro.js"></script>

</body>

</html>
